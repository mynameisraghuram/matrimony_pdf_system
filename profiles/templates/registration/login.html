<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Matrimony PDF System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container">
    <div class="row justify-content-center mt-5">
      <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <div class="text-center mb-4">
              <h4 class="fw-bold" style="color: #C42027;">Reddy &amp; Reddy</h4>
              <p class="text-muted small mb-0">Matrimony PDF System</p>
            </div>

            {% if form.errors %}
              <div class="alert alert-danger py-2 small">
                Invalid username or password. Please try again.
              </div>
            {% endif %}

            {% for message in messages %}
              <div class="alert alert-{{ message.tags }} py-2 small">{{ message }}</div>
            {% endfor %}

            <form method="POST">
              {% csrf_token %}
              <div class="mb-3">
                <label for="id_username" class="form-label small fw-bold">Username</label>
                <input type="text" name="username" id="id_username" class="form-control"
                       autofocus required value="{{ form.username.value|default:'' }}">
              </div>
              <div class="mb-3">
                <label for="id_password" class="form-label small fw-bold">Password</label>
                <input type="password" name="password" id="id_password" class="form-control" required>
              </div>
              <button type="submit" class="btn w-100 text-white" style="background-color: #C42027;">
                Sign In
              </button>
              {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
              {% endif %}
            </form>
          </div>
        </div>
        <p class="text-center text-muted small mt-3">Contact admin if you need an account.</p>
      </div>
    </div>
  </div>
</body>
</html>
